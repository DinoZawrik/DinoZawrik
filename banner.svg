<svg fill="none" viewBox="0 0 860 180" width="860" height="180" xmlns="http://www.w3.org/2000/svg">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@keyframes a1 {
  0%,100% { transform: translate(-15%, -20%) scale(1.2); }
  50%      { transform: translate(12%, 15%) scale(1.6); }
}
@keyframes a2 {
  0%,100% { transform: translate(18%, 12%) scale(1.3); }
  50%      { transform: translate(-12%, -18%) scale(1.7); }
}
@keyframes a3 {
  0%,100% { transform: translate(5%, 18%) scale(1.4); }
  50%      { transform: translate(-8%, -12%) scale(1.2); }
}
@keyframes a4 {
  0%,100% { transform: translate(-5%, 5%) scale(1.1); }
  50%      { transform: translate(8%, -8%) scale(1.4); }
}
@keyframes gm {
  0%,88%,100% { transform: translate(0,0); }
  90%          { transform: translate(-3px, 1px); }
  92%          { transform: translate(3px, -1px); }
  95%          { transform: translate(-1px, 0); }
}
@keyframes gr {
  0%,88%,100% { opacity: 0; transform: translate(0,0); }
  90%          { opacity: 0.55; transform: translate(5px, 0); }
  93%          { opacity: 0.4;  transform: translate(-4px, 0); }
  96%          { opacity: 0; }
}
@keyframes gb {
  0%,90%,100% { opacity: 0; transform: translate(0,0); }
  91%          { opacity: 0.4;  transform: translate(-6px, 0); }
  94%          { opacity: 0.35; transform: translate(3px, 0); }
  97%          { opacity: 0; }
}
@keyframes blink { 50% { opacity: 0; } }

.wrap {
  width: 860px;
  height: 180px;
  background: #07040f;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', Courier, monospace;
}

.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
}
.b1 {
  width: 640px; height: 380px;
  top: -110px; left: -90px;
  background: radial-gradient(ellipse, rgba(106,34,221,0.65) 0%, rgba(58,31,154,0.25) 45%, transparent 70%);
  animation: a1 9s ease-in-out infinite;
}
.b2 {
  width: 540px; height: 340px;
  bottom: -100px; right: -80px;
  background: radial-gradient(ellipse, rgba(34,85,221,0.55) 0%, rgba(31,58,154,0.22) 45%, transparent 70%);
  animation: a2 11s ease-in-out infinite;
}
.b3 {
  width: 460px; height: 280px;
  top: -60px; right: 80px;
  background: radial-gradient(ellipse, rgba(170,34,238,0.55) 0%, rgba(90,31,170,0.22) 45%, transparent 70%);
  animation: a3 7.5s ease-in-out infinite;
}
.b4 {
  width: 320px; height: 220px;
  top: 20px; left: 270px;
  background: radial-gradient(ellipse, rgba(119,68,238,0.5) 0%, transparent 65%);
  animation: a4 6s ease-in-out infinite;
}

.vign {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 25%, rgba(7,4,15,0.55) 100%);
}

.bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, #2d1f6e, #7c6fcd, #2d1f6e);
}

.content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.name-wrap {
  position: relative;
  display: inline-block;
  line-height: 1;
}
.name-main {
  font-size: 52px;
  font-weight: 900;
  color: #c5b8ff;
  text-shadow: 0 0 25px rgba(124,111,205,0.5);
  animation: gm 4s infinite;
  display: block;
}
.name-r {
  position: absolute;
  inset: 0;
  font-size: 52px;
  font-weight: 900;
  color: #ff6b9d;
  opacity: 0;
  animation: gr 4s infinite;
}
.name-b {
  position: absolute;
  inset: 0;
  font-size: 52px;
  font-weight: 900;
  color: #6bf8ff;
  opacity: 0;
  animation: gb 4s 0.5s infinite;
}

.sub {
  font-size: 12px;
  color: #7c6fcd;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.cursor {
  display: inline-block;
  width: 2px;
  height: 14px;
  background: #7c6fcd;
  vertical-align: middle;
  margin-left: 2px;
  animation: blink 1s step-end infinite;
}
</style>

<div class="wrap">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
  <div class="vign"></div>
  <div class="bar"></div>

  <div class="content">
    <div class="name-wrap">
      <span class="name-main">DinoZawrik</span>
      <span class="name-r">DinoZawrik</span>
      <span class="name-b">DinoZawrik</span>
    </div>
    <div class="sub">AI Engineer · RAG · Multi-Agent · LLMOps<span class="cursor"></span></div>
  </div>
</div>

</div>
</foreignObject>
</svg>
